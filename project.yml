name: KanjiJustOne
options:
  bundleIdPrefix: com.reremo
  deploymentTarget:
    iOS: "17.0"
packages:
  KanjiCore:
    path: Packages/KanjiCore
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: 12.0.0
targets:
  KanjiJustOne:
    type: application
    platform: iOS
    sources:
      - App
    dependencies:
      - package: KanjiCore
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 552TRQJAS5
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: 漢字の力
        UILaunchScreen: {}
        UIAppFonts:
          - KosugiMaru-Regular.ttf
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        # AdMob（開発中はGoogle公式のテストApp ID。リリース時に自分のIDへ差し替える）
        GADApplicationIdentifier: ca-app-pub-3940256099942544~1458002511
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
schemes:
  KanjiJustOne:
    build:
      targets:
        KanjiJustOne: all
    run:
      config: Debug
      storeKitConfiguration: Products.storekit
